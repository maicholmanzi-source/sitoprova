<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Accedi - UrbanVibe</title>
  <link rel="stylesheet" href="style.css" />
  <style>
    .auth-wrapper {
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 20px;
      background: linear-gradient(135deg, #f8fafc, #e2e8f0);
    }

    .auth-card {
      width: 100%;
      max-width: 440px;
      background: white;
      border-radius: 22px;
      padding: 30px;
      box-shadow: 0 12px 30px rgba(15, 23, 42, 0.08);
    }

    .auth-brand {
      display: inline-block;
      margin-bottom: 14px;
      background: #ecfeff;
      color: #0f766e;
      padding: 8px 12px;
      border-radius: 999px;
      font-size: 13px;
      font-weight: 700;
    }

    .auth-card h1 {
      margin-bottom: 10px;
      color: #0f172a;
      font-size: 30px;
    }

    .auth-card p {
      color: #6b7280;
      margin-bottom: 22px;
      line-height: 1.6;
    }

    .auth-form {
      display: grid;
      gap: 14px;
    }

    .field-label {
      display: block;
      font-size: 14px;
      font-weight: 700;
      color: #374151;
      margin-bottom: 8px;
    }

    .auth-form input {
      width: 100%;
      padding: 13px 14px;
      border: 1px solid #d1d5db;
      border-radius: 12px;
      font-size: 15px;
      outline: none;
      background: white;
    }

    .auth-form input:focus {
      border-color: #06b6d4;
    }

    .auth-form button {
      width: 100%;
      margin-top: 4px;
    }

    .auth-status {
      margin-top: 16px;
      padding: 12px 14px;
      border-radius: 12px;
      display: none;
      font-weight: 600;
    }

    .auth-status.error {
      display: block;
      background: #fef2f2;
      color: #991b1b;
    }

    .auth-status.success {
      display: block;
      background: #ecfdf5;
      color: #065f46;
    }

    .auth-links {
      margin-top: 20px;
      text-align: center;
      display: grid;
      gap: 10px;
    }

    .auth-links a {
      color: #0f172a;
      text-decoration: none;
      font-weight: 700;
    }
  </style>
</head>
<body>
  <main class="auth-wrapper">
    <section class="auth-card">
      <span class="auth-brand">UrbanVibe</span>
      <h1>Accedi</h1>
      <p>Entra nel tuo account per continuare gli acquisti.</p>

      <form id="login-form" class="auth-form">
        <div>
          <label class="field-label" for="login-email">Email</label>
          <input type="email" id="login-email" placeholder="mario@email.com" required />
        </div>

        <div>
          <label class="field-label" for="login-password">Password</label>
          <input type="password" id="login-password" placeholder="Inserisci password" required />
        </div>

        <button type="submit" class="btn-primary">Accedi</button>
      </form>

      <div id="login-status" class="auth-status"></div>

      <div class="auth-links">
        <a href="register.html">Non hai un account? Registrati</a>
        <a href="index.html">← Torna al negozio</a>
      </div>
    </section>
  </main>

  <script src="login.js"></script>
</body>
</html>
