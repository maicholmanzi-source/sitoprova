<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>UrbanVibe - E-commerce</title>
  <link rel="stylesheet" href="style.css" />
  <style>
    body {
      background: #f8fafc;
      color: #0f172a;
    }

    .header {
      background: #0f172a;
      color: white;
      padding: 16px 24px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 20px;
      flex-wrap: wrap;
      position: sticky;
      top: 0;
      z-index: 100;
      box-shadow: 0 10px 24px rgba(15, 23, 42, 0.12);
    }

    .logo {
      font-size: 28px;
      font-weight: 800;
      letter-spacing: 0.02em;
    }

    .header nav {
      display: flex;
      align-items: center;
      gap: 16px;
      flex-wrap: wrap;
    }

    .header nav a {
      color: white;
      text-decoration: none;
      font-weight: 600;
    }

    .header nav a:hover {
      opacity: 0.9;
    }

    .header-right {
      display: flex;
      align-items: center;
      gap: 12px;
      flex-wrap: wrap;
    }

    .header-auth-area {
      display: flex;
      align-items: center;
      gap: 10px;
      flex-wrap: wrap;
    }

    .header-user-greeting {
      color: white;
      font-weight: 700;
      font-size: 14px;
    }

    .header-link-btn {
      background: white;
      color: #111827;
      border: 1px solid #d1d5db;
      padding: 10px 14px;
      border-radius: 10px;
      cursor: pointer;
      font-weight: 700;
      text-decoration: none;
      display: inline-flex;
      align-items: center;
      justify-content: center;
    }

    .header-link-btn:hover {
      background: #f9fafb;
    }

    .header-link-btn.primary {
      background: #ff6b00;
      color: white;
      border-color: #ff6b00;
    }

    .header-link-btn.primary:hover {
      filter: brightness(0.96);
    }

    .cart-btn {
      background: #ff6b00;
      color: white;
      border: none;
      padding: 12px 16px;
      border-radius: 12px;
      cursor: pointer;
      font-weight: 700;
      box-shadow: 0 8px 18px rgba(255, 107, 0, 0.2);
    }

    .cart-btn:hover {
      filter: brightness(0.96);
    }

    .hero {
      max-width: 1240px;
      margin: 30px auto 0;
      padding: 0 20px;
    }

    .hero > div {
      background: linear-gradient(135deg, #111827, #1f2937);
      color: white;
      border-radius: 28px;
      padding: 48px 32px;
      box-shadow: 0 18px 45px rgba(15, 23, 42, 0.12);
    }

    .hero h1 {
      font-size: 48px;
      line-height: 1.1;
      margin-bottom: 14px;
    }

    .hero p {
      color: #cbd5e1;
      font-size: 17px;
      line-height: 1.7;
      max-width: 700px;
      margin-bottom: 22px;
    }

    .container {
      max-width: 1240px;
      margin: 34px auto 40px;
      padding: 0 20px;
    }

    .container h2 {
      font-size: 34px;
      margin-bottom: 18px;
      color: #0f172a;
    }

    .filters-bar {
      display: flex;
      gap: 14px;
      margin-bottom: 28px;
      flex-wrap: wrap;
    }

    .search-input,
    .category-filter {
      padding: 14px 16px;
      border: 1px solid #d1d5db;
      border-radius: 14px;
      background: white;
      font-size: 15px;
      outline: none;
    }

    .search-input {
      flex: 1;
      min-width: 240px;
    }

    .category-filter {
      min-width: 220px;
    }

    .search-input:focus,
    .category-filter:focus {
      border-color: #ff7a00;
    }

    .product-grid {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 22px;
    }

    .product-card {
      background: white;
      border-radius: 22px;
      overflow: hidden;
      box-shadow: 0 12px 30px rgba(15, 23, 42, 0.08);
      transition: transform 0.2s ease, box-shadow 0.2s ease;
    }

    .product-card:hover {
      transform: translateY(-4px);
      box-shadow: 0 18px 40px rgba(15, 23, 42, 0.12);
    }

    .product-image {
      width: 100%;
      height: 180px;
      overflow: hidden;
      background: #e5e7eb;
    }

    .product-image-real {
      width: 100%;
      height: 180px;
      object-fit: cover;
      display: block;
      background: #ececec;
    }

    .product-image-fallback {
      height: 180px;
      background: #ececec;
      display: flex;
      justify-content: center;
      align-items: center;
      font-size: 44px;
    }

    .product-info {
      padding: 18px;
    }

    .product-category {
      display: inline-block;
      background: #fff7ed;
      color: #ea580c;
      padding: 6px 10px;
      border-radius: 999px;
      font-size: 13px;
      font-weight: 700;
      margin-bottom: 12px;
    }

    .product-info h3 {
      font-size: 22px;
      margin-bottom: 10px;
      color: #0f172a;
    }

    .product-info p {
      color: #6b7280;
      line-height: 1.6;
      min-height: 52px;
    }

    .price {
      font-size: 24px;
      font-weight: 800;
      margin-top: 16px;
      color: #111827;
    }

    .product-buttons {
      display: flex;
      gap: 10px;
      margin-top: 16px;
      flex-wrap: wrap;
    }

    .product-buttons .btn-outline,
    .product-buttons .btn-primary {
      flex: 1;
      text-align: center;
    }

    .btn-primary,
    .btn-secondary,
    .btn-outline {
      padding: 12px 16px;
      border-radius: 12px;
      font-weight: 700;
      border: none;
      cursor: pointer;
      text-decoration: none;
      display: inline-flex;
      align-items: center;
      justify-content: center;
    }

    .btn-primary {
      background: #ff6b00;
      color: white;
    }

    .btn-primary:hover {
      filter: brightness(0.96);
    }

    .btn-secondary {
      background: #0f172a;
      color: white;
    }

    .btn-outline {
      background: white;
      color: #111827;
      border: 1px solid #d1d5db;
    }

    .btn-outline:hover {
      background: #f9fafb;
    }

    .cart-sidebar {
      position: fixed;
      top: 0;
      right: 0;
      width: 380px;
      max-width: 100%;
      height: 100vh;
      background: white;
      box-shadow: -10px 0 30px rgba(15, 23, 42, 0.15);
      padding: 24px;
      z-index: 1000;
      display: flex;
      flex-direction: column;
    }

    .cart-sidebar.hidden {
      display: none;
    }

    .cart-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      margin-bottom: 18px;
    }

    .cart-header h2 {
      color: #0f172a;
      font-size: 28px;
      margin: 0;
    }

    #close-cart {
      border: none;
      background: transparent;
      font-size: 22px;
      cursor: pointer;
    }

    .cart-items {
      flex: 1;
      overflow-y: auto;
      display: grid;
      gap: 12px;
      margin-bottom: 18px;
    }

    .cart-footer {
      border-top: 1px solid #e5e7eb;
      padding-top: 16px;
      display: grid;
      gap: 12px;
    }

    @media (max-width: 1100px) {
      .product-grid {
        grid-template-columns: repeat(3, minmax(0, 1fr));
      }
    }

    @media (max-width: 820px) {
      .product-grid {
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }
    }

    @media (max-width: 900px) {
      .header {
        gap: 12px;
        padding: 16px 20px;
      }

      .header-right {
        width: 100%;
        justify-content: space-between;
      }
    }

    @media (max-width: 560px) {
      .hero h1 {
        font-size: 36px;
      }

      .product-grid {
        grid-template-columns: 1fr;
      }

      .hero,
      .container {
        padding: 0 16px;
      }
    }
  </style>
</head>
<body>
  <header class="header">
    <div class="logo">UrbanVibe</div>

    <nav>
      <a href="#home">Home</a>
      <a href="#prodotti">Prodotti</a>
      <a href="#" id="nav-cart-link">Carrello</a>
    </nav>

    <div class="header-right">
      <div id="header-auth-area" class="header-auth-area"></div>

      <button id="cart-btn" class="cart-btn">
        🛒 Carrello (<span id="cart-count">0</span>)
      </button>
    </div>
  </header>

  <section class="hero" id="home">
    <div>
      <h1>Il tuo negozio online</h1>
      <p>
        Una base semplice e moderna per creare il tuo e-commerce passo passo,
        con prodotti, carrello, checkout, account utenti e pannello admin.
      </p>
      <a href="#prodotti" class="btn-primary">Vai ai prodotti</a>
    </div>
  </section>

  <main class="container">
    <section id="prodotti">
      <h2>I nostri prodotti</h2>

      <div class="filters-bar">
        <input
          type="text"
          id="search-input"
          placeholder="Cerca un prodotto..."
          class="search-input"
        />

        <select id="category-filter" class="category-filter">
          <option value="Tutte">Tutte le categorie</option>
        </select>

        <select id="sort-filter" class="category-filter">
          <option value="default">Ordina per</option>
          <option value="price-asc">Prezzo: dal più basso</option>
          <option value="price-desc">Prezzo: dal più alto</option>
          <option value="name-asc">Nome: A-Z</option>
          <option value="name-desc">Nome: Z-A</option>
        </select>
      </div>

      <div id="product-list" class="product-grid"></div>
    </section>
  </main>

  <aside id="cart-sidebar" class="cart-sidebar hidden">
    <div class="cart-header">
      <h2>Carrello</h2>
      <button id="close-cart">✖</button>
    </div>

    <div id="cart-items" class="cart-items"></div>

    <div class="cart-footer">
      <p><strong>Totale: € <span id="cart-total">0.00</span></strong></p>
      <button id="clear-cart" class="btn-secondary">Svuota carrello</button>
      <a href="checkout.html" class="btn-primary">Checkout</a>
    </div>
  </aside>

  <script src="script.js"></script>
</body>
</html>
