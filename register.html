<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Registrati - UrbanVibe</title>
  <link rel="stylesheet" href="style.css" />
  <style>
    .auth-wrapper {
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 20px;
      background: linear-gradient(135deg, #f8fafc, #e2e8f0);
    }

    .auth-card {
      width: 100%;
      max-width: 560px;
      background: white;
      border-radius: 22px;
      padding: 30px;
      box-shadow: 0 12px 30px rgba(15, 23, 42, 0.08);
    }

    .auth-brand {
      display: inline-block;
      margin-bottom: 14px;
      background: #ecfeff;
      color: #0f766e;
      padding: 8px 12px;
      border-radius: 999px;
      font-size: 13px;
      font-weight: 700;
    }

    .auth-card h1 {
      margin-bottom: 10px;
      color: #0f172a;
      font-size: 30px;
    }

    .auth-card p {
      color: #6b7280;
      margin-bottom: 22px;
      line-height: 1.6;
    }

    .auth-form {
      display: grid;
      gap: 14px;
    }

    .field-label {
      display: block;
      font-size: 14px;
      font-weight: 700;
      color: #374151;
      margin-bottom: 8px;
    }

    .auth-form input,
    .auth-form select {
      width: 100%;
      padding: 13px 14px;
      border: 1px solid #d1d5db;
      border-radius: 12px;
      font-size: 15px;
      outline: none;
      background: white;
    }

    .auth-form input:focus,
    .auth-form select:focus {
      border-color: #06b6d4;
    }

    .auth-grid-2 {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 14px;
    }

    .business-box {
      display: none;
      padding: 16px;
      border: 1px solid #e5e7eb;
      border-radius: 16px;
      background: #f8fafc;
    }

    .business-box h3 {
      margin-bottom: 12px;
      color: #0f172a;
      font-size: 18px;
    }

    .auth-form button {
      width: 100%;
      margin-top: 4px;
    }

    .auth-status {
      margin-top: 16px;
      padding: 12px 14px;
      border-radius: 12px;
      display: none;
      font-weight: 600;
    }

    .auth-status.error {
      display: block;
      background: #fef2f2;
      color: #991b1b;
    }

    .auth-status.success {
      display: block;
      background: #ecfdf5;
      color: #065f46;
    }

    .auth-links {
      margin-top: 20px;
      text-align: center;
      display: grid;
      gap: 10px;
    }

    .auth-links a {
      color: #0f172a;
      text-decoration: none;
      font-weight: 700;
    }

    @media (max-width: 640px) {
      .auth-grid-2 {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <main class="auth-wrapper">
    <section class="auth-card">
      <span class="auth-brand">UrbanVibe</span>
      <h1>Crea il tuo account</h1>
      <p>Registrati come cliente privato oppure come azienda.</p>

      <form id="register-form" class="auth-form">
        <div>
          <label class="field-label" for="register-account-type">Tipo account</label>
          <select id="register-account-type" required>
            <option value="private">Privato</option>
            <option value="business">Azienda</option>
          </select>
        </div>

        <div class="auth-grid-2">
          <div>
            <label class="field-label" for="register-name">Nome e cognome</label>
            <input type="text" id="register-name" placeholder="Mario Rossi" required />
          </div>

          <div>
            <label class="field-label" for="register-email">Email</label>
            <input type="email" id="register-email" placeholder="mario@email.com" required />
          </div>
        </div>

        <div class="auth-grid-2">
          <div>
            <label class="field-label" for="register-password">Password</label>
            <input type="password" id="register-password" placeholder="Almeno 6 caratteri" required />
          </div>

          <div>
            <label class="field-label" for="register-city">Città</label>
            <input type="text" id="register-city" placeholder="Milano" />
          </div>
        </div>

        <div>
          <label class="field-label" for="register-address">Indirizzo</label>
          <input type="text" id="register-address" placeholder="Via Roma 10" />
        </div>

        <div id="business-fields" class="business-box">
          <h3>Dati azienda</h3>

          <div class="auth-grid-2">
            <div>
              <label class="field-label" for="register-company-name">Ragione sociale</label>
              <input type="text" id="register-company-name" placeholder="Rossi SRL" />
            </div>

            <div>
              <label class="field-label" for="register-vat-number">Partita IVA</label>
              <input type="text" id="register-vat-number" placeholder="12345678901" />
            </div>
          </div>

          <div>
            <label class="field-label" for="register-contact-person">Referente</label>
            <input type="text" id="register-contact-person" placeholder="Mario Rossi" />
          </div>
        </div>

        <button type="submit" class="btn-primary">Registrati</button>
      </form>

      <div id="register-status" class="auth-status"></div>

      <div class="auth-links">
        <a href="login.html">Hai già un account? Accedi</a>
        <a href="index.html">← Torna al negozio</a>
      </div>
    </section>
  </main>

  <script src="register.js"></script>
</body>
</html>
